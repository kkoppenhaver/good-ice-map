name: Claude Jira - Implement

on:
  repository_dispatch:
    types: [claude-implement]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch comments from Jira
        id: fetch-comments
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          COMMENTS=$(curl -s \
            "${JIRA_BASE_URL}/rest/api/2/issue/${ISSUE_KEY}/comment?orderBy=created" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}")

          THREAD=$(echo "$COMMENTS" | jq -r '.comments[] | "[\(.author.displayName)]:\n\(.body)\n"')

          echo "thread<<THREAD_EOF" >> "$GITHUB_OUTPUT"
          echo "$THREAD" >> "$GITHUB_OUTPUT"
          echo "THREAD_EOF" >> "$GITHUB_OUTPUT"

      - name: Download Jira attachments
        id: jira-attachments
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          mkdir -p /tmp/jira-attachments

          RESPONSE=$(curl -s -f \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}?fields=attachment" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}") || { echo "Failed to fetch issue attachments"; exit 1; }

          ATTACHMENTS=$(echo "$RESPONSE" | \
            jq -r '(.fields.attachment // [])[] | select(.mimeType | startswith("image/")) | [.id, .filename, .content] | @tsv') || true

          FILE_LIST=""
          if [ -n "$ATTACHMENTS" ]; then
            while IFS=$'\t' read -r ID FILENAME URL; do
              [ -z "$URL" ] && continue

              curl -s -f -o "/tmp/jira-attachments/${FILENAME}" \
                -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
                "$URL" && {
                FILE_LIST="${FILE_LIST}- /tmp/jira-attachments/${FILENAME}\n"
                echo "Downloaded: ${FILENAME}"
              } || echo "Warning: Failed to download ${FILENAME}"
            done <<< "$ATTACHMENTS"
          fi

          if [ -n "$FILE_LIST" ]; then
            echo "has_attachments=true" >> "$GITHUB_OUTPUT"
            echo "file_list<<ATTACHMENTS_EOF" >> "$GITHUB_OUTPUT"
            echo -e "$FILE_LIST" >> "$GITHUB_OUTPUT"
            echo "ATTACHMENTS_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_attachments=false" >> "$GITHUB_OUTPUT"
            echo "file_list=No image attachments found." >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code - Implement
        id: claude-implement
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are implementing a Jira ticket. Create a branch, write the code, and open a pull request.

            ## Jira Ticket: ${{ github.event.client_payload.issue_key }}

            **Summary:** ${{ github.event.client_payload.summary }}

            **Description:**
            ${{ github.event.client_payload.description }}

            **Ticket comments (plan, questions, and answers):**
            ${{ steps.fetch-comments.outputs.thread }}

            **Attached Images:**
            ${{ steps.jira-attachments.outputs.file_list }}
            ${{ steps.jira-attachments.outputs.has_attachments == 'true' && 'IMPORTANT: Use the Read tool to view the attached image files listed above. They contain visual context (mockups, screenshots, designs) relevant to this ticket.' || '' }}

            ---

            Instructions:
            1. Create a branch named `${{ github.event.client_payload.issue_key }}` (lowercase, e.g., `scrum-123`)
            2. If an implementation plan exists in the comments above, follow it. If there are answers to clarifying questions, incorporate that context. If there are no comments, analyze the ticket summary and description yourself to determine the best approach.
            3. Implement the changes
            4. Run the test suite to verify nothing is broken
            5. Open a pull request with:
               - Title: `${{ github.event.client_payload.issue_key }}: ${{ github.event.client_payload.summary }}`
               - Body that references the Jira ticket and summarizes changes
            6. Output the PR URL as the last line of your response

          claude_args: '--model claude-opus-4-6 --allowed-tools "Read,Glob,Grep,Edit,Write,Bash"'

      - name: Extract PR URL from execution output
        id: extract-pr
        env:
          EXECUTION_FILE: ${{ steps.claude-implement.outputs.execution_file }}
        run: |
          RESULT=$(jq -r '[.[] | select(.type == "result") | .result // empty] | last // ""' "$EXECUTION_FILE")
          PR_URL=$(echo "$RESULT" | grep -oP 'https://github.com/[^\s]+/pull/\d+' | tail -1)

          if [ -z "$PR_URL" ]; then
            echo "Warning: Could not extract PR URL from Claude's response"
            PR_URL="(PR URL not detected - check GitHub for the latest PR)"
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Post PR link to Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          PR_URL: ${{ steps.extract-pr.outputs.pr_url }}
        run: |
          jq -n --arg body "*Claude has opened a PR:* ${PR_URL}

          The implementation is ready for review. Claude will respond to PR review comments and push fixes." \
            '{body: $body}' | \
          curl -s -X POST \
            "${JIRA_BASE_URL}/rest/api/2/issue/${ISSUE_KEY}/comment" \
            -H "Content-Type: application/json" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -d @-

      - name: Transition ticket to Ready for Review
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          TRANSITIONS=$(curl -s \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/transitions" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}")

          TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r '.transitions[] | select(.name == "Ready for Review") | .id')

          if [ -n "$TRANSITION_ID" ] && [ "$TRANSITION_ID" != "null" ]; then
            curl -s -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/transitions" \
              -H "Content-Type: application/json" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -d "{\"transition\": {\"id\": \"${TRANSITION_ID}\"}}"
            echo "Transitioned ticket to Ready for Review"
          else
            echo "Warning: Could not find 'Ready for Review' transition. Available transitions:"
            echo "$TRANSITIONS" | jq '.transitions[].name'
          fi

      - name: Unassign ticket
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          curl -s -X PUT \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/assignee" \
            -H "Content-Type: application/json" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -d '{"accountId": null}'
          echo "Unassigned ticket"
