name: Claude Jira - Plan

on:
  repository_dispatch:
    types: [claude-plan]

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code - Generate Plan
        id: claude-plan
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are analyzing a Jira ticket to create an implementation plan. Do NOT write any code yet.

            ## Jira Ticket: ${{ github.event.client_payload.issue_key }}

            **Summary:** ${{ github.event.client_payload.summary }}

            **Description:**
            ${{ github.event.client_payload.description || 'No description provided. Use the summary above and your analysis of the codebase to determine what needs to be done.' }}

            **Additional Instructions:**
            ${{ github.event.client_payload.comment }}

            ---

            Please analyze this ticket and the codebase, then create an implementation plan. Scale the plan's detail to match the ticket's complexity:

            - For simple changes (typos, config tweaks, small bug fixes): a brief summary of what you'll change and which files are involved is sufficient.
            - For moderate changes: include your understanding, the files to change, and implementation steps.
            - For complex changes (new features, architectural work, multi-file refactors): include all of the following:
              1. Understanding — restate the goal in your own words
              2. Approach — high-level strategy
              3. Files to Change — specific files you'll create or modify
              4. Implementation Steps — numbered steps with details
              5. Testing Plan — how you'll verify the changes work
              6. Risks & Questions — anything unclear or risky

            Be specific to this codebase. Reference actual files, classes, and patterns you find.

            IMPORTANT: No preamble, no title, no introduction. Start directly with the plan content. This will be posted directly to the Jira ticket.

          claude_args: '--allowed-tools "Read,Glob,Grep,Bash(find:*),Bash(ls:*)"'

      - name: Transition ticket to Ready for Dev
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          TRANSITIONS=$(curl -s \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/transitions" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}")

          TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r '.transitions[] | select(.name == "Ready for Dev") | .id')

          if [ -n "$TRANSITION_ID" ] && [ "$TRANSITION_ID" != "null" ]; then
            curl -s -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/transitions" \
              -H "Content-Type: application/json" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -d "{\"transition\": {\"id\": \"${TRANSITION_ID}\"}}"
            echo "Transitioned ticket to Ready for Dev"
          else
            echo "Warning: Could not find 'Ready for Dev' transition. Available transitions:"
            echo "$TRANSITIONS" | jq '.transitions[].name'
          fi

      - name: Extract plan from execution output
        id: extract-plan
        env:
          EXECUTION_FILE: ${{ steps.claude-plan.outputs.execution_file }}
        run: |
          PLAN=$(jq -r '[.[] | select(.type == "result") | .result // empty] | last // "No plan generated"' "$EXECUTION_FILE")
          echo "plan<<PLAN_EOF" >> "$GITHUB_OUTPUT"
          echo "$PLAN" >> "$GITHUB_OUTPUT"
          echo "PLAN_EOF" >> "$GITHUB_OUTPUT"

      - name: Post plan to Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          PLAN: ${{ steps.extract-plan.outputs.plan }}
        run: |
          COMMENT_BODY="${PLAN}

          ----
          _To approve and start implementation, assign this ticket to Claude. To request a revised plan, move back to Planning and assign to Claude with a comment._"

          jq -n --arg body "$COMMENT_BODY" '{body: $body}' | \
          curl -s -X POST \
            "${JIRA_BASE_URL}/rest/api/2/issue/${ISSUE_KEY}/comment" \
            -H "Content-Type: application/json" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -d @-

      - name: Unassign ticket
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          curl -s -X PUT \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/assignee" \
            -H "Content-Type: application/json" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -d '{"accountId": null}'
          echo "Unassigned ticket"
